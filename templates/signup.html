<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAM - Signup</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-frame">
      <section class="auth-card">
        <div class="auth-badge">DAM</div>

        <header class="auth-header">
          <p class="auth-kicker">Hackathon Access</p>
          <h1 class="auth-title">
            <span>Create An Account</span>
            <span>Signup</span>
          </h1>
        </header>

        <div class="alert alert-error" id="errAlert"></div>
        <div class="alert alert-success" id="okAlert"></div>

        <div class="form-group">
          <label for="email">Email / Phone Number</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 9999999999" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" />
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Re-enter password" />
        </div>

        <label class="form-check" for="showPw">
          <input type="checkbox" id="showPw" onchange="togglePassword()" />
          <span>Show password</span>
        </label>

        <button class="btn btn-primary wide" id="signupBtn" onclick="handleSignup()">Next</button>

        <p class="auth-textline">Already have an account? Use the login page.</p>

        <div class="auth-footer-actions">
          <a class="btn btn-secondary" href="/login">Login</a>
        </div>
      </section>
    </div>
  </div>

  <script>
    function togglePassword() {
      const type = document.getElementById("showPw").checked ? "text" : "password";
      document.getElementById("password").type = type;
      document.getElementById("confirm").type = type;
    }

    async function handleSignup() {
      const button = document.getElementById("signupBtn");
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirm").value.trim();

      hideAlerts();

      if (!email || !password || !confirmPassword) {
        showAlert("errAlert", "Please fill in all required fields.");
        return;
      }

      if (password.length < 6) {
        showAlert("errAlert", "Password must be at least 6 characters.");
        return;
      }

      if (password !== confirmPassword) {
        showAlert("errAlert", "Passwords do not match.");
        return;
      }

      button.disabled = true;
      button.innerHTML = '<span class="spinner"></span> Creating account';

      try {
        const response = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            phone,
            password,
            confirm_password: confirmPassword
          })
        });
        const data = await response.json();

        if (data.success) {
          showAlert("okAlert", "Account created. Redirecting to login.");
          setTimeout(() => {
            window.location.href = data.redirect;
          }, 1200);
          return;
        }

        showAlert("errAlert", data.message || "Registration failed.");
      } catch (error) {
        showAlert("errAlert", "Server error. Is Flask running?");
      } finally {
        button.disabled = false;
        button.textContent = "Next";
      }
    }

    function showAlert(id, message) {
      const alertBox = document.getElementById(id);
      alertBox.textContent = message;
      alertBox.style.display = "block";
    }

    function hideAlerts() {
      document.getElementById("errAlert").style.display = "none";
      document.getElementById("okAlert").style.display = "none";
    }
  </script>
</body>
</html>
